name: Debian Package

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always
  DEB_BUILD_OPTIONS: nocheck

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt update
          # cargo deps
          apt install -y \
            build-essential \
            devscripts \
            debhelper \
            dh-cargo \
            pkg-config \
            libudev-dev \
            libfuse3-dev \
            fuse3 \
            libclang-dev \
            curl \
            ca-certificates
          # debian packages for rust crates
          apt install -y librust-bindgen-dev librust-nix-dev librust-libc-dev librust-time-dev librust-log-dev librust-env-logger-dev librust-libudev-dev librust-regex-dev librust-async-channel-dev librust-futures-dev librust-async-io-dev librust-anyhow-dev librust-clap-dev librust-base64-dev || true

      - name: Install Rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Show versions (debug)
        run: |
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version
          dpkg-buildpackage --version

      - name: Debug debian files
        run: |
          cat debian/rules
          echo "---"
          cat debian/control

      - name: Patch debian/rules for Debian 12 compatibility
        run: |
          sed -i '/dh-sequence-bash-completion,/d' debian/control

      - name: Build Debian package
        run: |
          . "$HOME/.cargo/env"
          dpkg-buildpackage -us -uc -b -d

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv ../*.deb artifacts/ || true
          mv ../*.buildinfo artifacts/ || true
          mv ../*.changes artifacts/ || true

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vuinputd-debian-package
          path: artifacts/
